version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: devflow-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: devflow
    ports:
      - "5432:5432"
    volumes:
      - devflow_postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: devflow-redis
    ports:
      - "6379:6379"

volumes:
  devflow_postgres:
