name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devflow
      - run: npm run lint
      - run: npx tsc --noEmit

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devflow_test
      - run: npm test
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devflow_test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci --legacy-peer-deps
      - run: npx prisma generate
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devflow
      - run: npm run build
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/devflow
          NEXTAUTH_SECRET: ci-secret-key-32-chars-minimum-ok
          NEXTAUTH_URL: http://localhost:3000
          ANTHROPIC_API_KEY: sk-ant-placeholder
          STRIPE_SECRET_KEY: sk_test_placeholder
          STRIPE_PUBLISHABLE_KEY: pk_test_placeholder
          STRIPE_WEBHOOK_SECRET: whsec_placeholder
          STRIPE_PRO_PRICE_ID: price_placeholder
